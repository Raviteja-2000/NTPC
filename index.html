
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RRB NTPC CBT-1 Interactive Guide</title>

<style>
body { font-family: Arial; margin:0; background:#f5f7fb; }
header { display:flex; justify-content:space-between; padding:10px 20px; background:#1f5fbf; color:white; }
.brand { display:flex; align-items:center; gap:10px; font-weight:bold; }
.tabs { display:flex; background:#eee; }
.tab { padding:10px 15px; border:none; cursor:pointer; }
.tab.active { background:#1f5fbf; color:white; }
.panel { display:none; padding:20px; }
.panel.visible { display:block; }
button { cursor:pointer; padding:6px 12px; }
.primary { background:#1f5fbf; color:white; border:none; }
.quiz-area { margin-top:20px; }
.hidden { display:none; }
</style>
</head>

<body>

<header>
  <div class="brand">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M3 4h18v2H3zM3 9h18v2H3zM3 14h12v2H3zM3 19h12v2H3z" fill="white"/>
    </svg>
    <span>RRB NTPC CBT‑1 Guide</span>
  </div>

  <div>
    <input id="searchInput" placeholder="Search...">
    <button onclick="search()">Search</button>
  </div>
</header>

<nav class="tabs">
  <button class="tab active" onclick="openTab('learn', this)">Learn</button>
  <button class="tab" onclick="openTab('quiz', this)">Quiz</button>
  <button class="tab" onclick="openTab('about', this)">About</button>
</nav>

<main>
  <section id="learn" class="panel visible">
    <h2>Learn Section</h2>
    <p>Select topics and start learning.</p>
  </section>

  <section id="quiz" class="panel">
    <h2>Quiz Mode</h2>

    <button class="primary" onclick="startQuiz()">Start Quiz</button>

    <div id="quizBox" class="quiz-area hidden">
      <p id="question"></p>
      <button onclick="answer('A')">A</button>
      <button onclick="answer('B')">B</button>
      <button onclick="answer('C')">C</button>
      <button onclick="answer('D')">D</button>
      <p id="result"></p>
    </div>
  </section>

  <section id="about" class="panel">
    <h2>About</h2>
    <ul>
      <li>https://www.adda247.com/jobs/rrb-ntpc-previous-year-question-paper/</li>
      <li><a href="https://www.sscadda.com/rrb-ntpc-previous-year-papers/" target="_blank">SSCADDA Papers</a></li>
      <li><a href="https://testbook.com/blog/rrb-ntpc-question-paper-2025-out/" target="_blank">Testbook Papers</a></li>
      <li><a href="https://prepp.in/rrb-ntpc-exam/practice-papers" target="_blank">Prepp Papers</a></li>
    </ul>
  </section>
</main>

<script>
function openTab(tab, el){
 document.querySelectorAll('.panel').forEach(p=>p.classList.remove('visible'));
 document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
 document.getElementById(tab).classList.add('visible');
 el.classList.add('active');
}

function search(){
 let val = document.getElementById('searchInput').value;
 alert('Searching: '+val);
}

let questions = [
 {q:"2+2=?", a:"A", opts:{A:"4",B:"3",C:"5",D:"6"}}
];
let current = 0;

function startQuiz(){
 document.getElementById('quizBox').classList.remove('hidden');
 loadQuestion();
}

function loadQuestion(){
 let q = questions[current];
 document.getElementById('question').innerText = q.q;
}

function answer(opt){
 let q = questions[current];
 if(opt===q.a){
   document.getElementById('result').innerText = "Correct ✅";
 } else {
   document.getElementById('result').innerText = "Wrong ❌";
 }
}
</script>

</body>
</html>
